name: Build and Release Firmware

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install PlatformIO
      run: pip install platformio
        
    - name: Build Firmware
      # Wir nutzen 'esp32-ota' für das Release-Build
      run: pio run --environment esp32-ota
        
    - name: Get firmware size
      id: fw_size
      run: |
        SIZE=$(stat -c%s .pio/build/esp32-ota/firmware.bin)
        echo "size=$SIZE" >> $GITHUB_OUTPUT
        
    - name: Update version.json
      run: |
        VERSION="${GITHUB_REF#refs/tags/v}"
        URL="https://github.com/${{ github.repository }}/releases/download/v$VERSION/firmware.bin"
        SIZE="${{ steps.fw_size.outputs.size }}"
        
        cat > version.json << EOF
        {
          "version": "$VERSION",
          "url": "$URL",
          "size": $SIZE,
          "notes": "Release $VERSION"
        }
        EOF
        
    - name: Commit version.json
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add version.json
        # Wir committen nur, wenn sich die Datei wirklich geändert hat
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update version.json to $GITHUB_REF_NAME" && git push origin HEAD:main)
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          .pio/build/esp32-ota/firmware.bin
          .pio/build/esp32-ota/partitions.bin
          .pio/build/esp32-ota/bootloader.bin
          version.json
        generate_release_notes: true